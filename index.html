    <!-- Day 50+3 perf fix: route-aware hero image preload (article pages) — port Day 39 S5C from mockup-A.
         Runs sync before React, kick-starts image fetch in parallel with JS bundle download.
         Target: LCP article pages ≤2.0s mobile. -->
    <script>
      (function () {
        var m = location.pathname.match(/\/bai-viet\/([\w-]+)/);
        if (!m) return;
        var l = document.createElement('link');
        l.rel = 'preload';
        l.as = 'image';
        l.href = '/images/articles/' + m[1] + '-hero.webp';
        l.fetchPriority = 'high';
        document.head.appendChild(l);
      })();
    </script>
